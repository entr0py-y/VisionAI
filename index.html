<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Vision AID</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0f0f10;
        --card: rgba(255, 255, 255, 0.05);
        --glass: rgba(255, 255, 255, 0.08);
        --accent: #ffffff;
        --muted: #a1a1aa;
        --divider: rgba(255, 255, 255, 0.08);
        --radius: 16px;
        --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        --success: #34d399;
        --danger: #f87171;
      }

      html,
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg);
        color: var(--accent);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        height: 100%;
      }

      body {
        max-width: 430px;
        margin: 0 auto;
        position: relative;
        min-height: 100vh;
        padding-bottom: 90px;
      }

      .app-container {
        padding: 20px 16px;
      }

      .header .subtitle {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 400;
      }

      .widgets-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0;
        margin-bottom: 12px;
        padding: 0 4px;
      }

      .widget-card {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: visible;
        min-height: 90px;
      }

      .widget-card::before {
        display: none;
      }

      .widget-card.widget-wide {
        grid-column: span 2;
        min-height: 80px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        margin-bottom: 4px;
        padding-bottom: 18px;
      }

      .widget-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: auto;
      }

      .widget-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .widget-icon svg {
        width: 16px;
        height: 16px;
        stroke: var(--muted);
        stroke-width: 1.5;
        fill: none;
        opacity: 0.5;
      }

      .widget-badge {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.25);
        letter-spacing: 1px;
        text-transform: uppercase;
        background: transparent;
        padding: 0;
        border-radius: 0;
        border: none;
      }

      .widget-bottom {
        margin-top: 8px;
      }

      .widget-value {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        line-height: 1;
        margin-bottom: 3px;
      }

      .widget-value.widget-value-sm {
        font-size: 20px;
        letter-spacing: 0;
      }

      .widget-label {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 400;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      .widget-sub {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.15);
        margin-top: 2px;
      }

      .widget-bar {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 2px;
        margin-top: 8px;
        overflow: hidden;
      }

      .widget-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 1s ease;
      }

      .widget-bar-fill.battery-fill {
        background: linear-gradient(90deg, #ffffff, #a0ffa0, #39ff14);
        box-shadow:
          0 0 8px rgba(57, 255, 20, 0.4),
          0 0 2px rgba(57, 255, 20, 0.6);
      }

      .widget-row-inline {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }

      .widget-row-inline .widget-unit {
        font-size: 14px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.3);
      }

      .widget-time-display {
        font-size: 48px;
        font-weight: 200;
        letter-spacing: -1.5px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .widget-time-seconds {
        font-size: 16px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.25);
        margin-left: 4px;
      }

      .widget-time-date {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 4px;
        font-weight: 400;
      }

      .widget-location-name {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2px;
        line-height: 1.2;
        margin-bottom: 3px;
      }

      .widget-coords {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.18);
        font-family: "SF Mono", "Fira Code", monospace;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .widget-signal-bars {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        margin-top: 6px;
      }

      .signal-bar {
        width: 3px;
        border-radius: 1px;
        background: rgba(255, 255, 255, 0.1);
      }

      .signal-bar.active {
        background: rgba(255, 255, 255, 0.4);
      }

      .widgets-divider {
        grid-column: span 2;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.05),
          transparent
        );
        margin: 2px 10px;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        padding: 0 4px;
      }

      .module-card {
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(255, 255, 255, 0.02) 40%,
          rgba(255, 255, 255, 0.04) 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 22px;
        padding: 16px 8px;
        cursor: pointer;
        transition: all var(--transition);
        backdrop-filter: blur(24px) saturate(150%) brightness(1.05);
        -webkit-backdrop-filter: blur(24px) saturate(150%) brightness(1.05);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        aspect-ratio: 1;
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.25),
          0 1px 3px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      }

      .module-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.02) 60%,
          transparent 100%
        );
        pointer-events: none;
        border-radius: 22px 22px 0 0;
      }

      .module-card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at 30% 20%,
          rgba(255, 255, 255, 0.06) 0%,
          transparent 50%
        );
        pointer-events: none;
        transition: all 0.5s ease;
      }

      .module-card:active {
        transform: scale(0.94);
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          inset 0 -1px 0 rgba(0, 0, 0, 0.15);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.09) 0%,
          rgba(255, 255, 255, 0.03) 40%,
          rgba(255, 255, 255, 0.05) 100%
        );
      }

      .module-card:hover {
        border-color: rgba(255, 255, 255, 0.18);
      }

      .card-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .module-card.module-card-wide {
        grid-column: span 3;
        aspect-ratio: auto;
        padding: 16px 20px;
        flex-direction: row;
        justify-content: space-evenly;
        height: 70px;
        cursor: default;
      }
      
      .module-card.module-card-wide:active {
        transform: none;
      }

      .card-icon svg {
        width: 24px;
        height: 24px;
        stroke: var(--accent);
        stroke-width: 1.5;
        fill: none;
        opacity: 0.85;
      }

      .card-content {
        text-align: center;
      }

      .card-title {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.2px;
        line-height: 1.3;
      }

      .card-desc {
        display: none;
      }

      .card-arrow {
        display: none;
        opacity: 0.3;
        flex-shrink: 0;
      }

      .card-arrow svg {
        width: 16px;
        height: 16px;
        stroke: var(--accent);
        stroke-width: 2;
        fill: none;
      }

      .hw-status-widget {
        position: absolute;
        bottom: 80px; 
        left: 20px;
        display: flex;
        gap: 15px;
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        z-index: 100;
        animation: slideUp 0.5s ease;
      }
      .hw-status-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
        transition: color 0.3s ease;
      }
      .hw-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 5px var(--danger);
        transition: all 0.3s ease;
      }
      .hw-dot.online {
        background: var(--success);
        box-shadow: 0 0 8px var(--success);
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 430px;
        background: linear-gradient(
          180deg,
          rgba(28, 28, 30, 0.55) 0%,
          rgba(22, 22, 24, 0.75) 50%,
          rgba(18, 18, 20, 0.85) 100%
        );
        backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
        -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 -8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 0;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 100;
        position: fixed;
      }

      .bottom-nav::before {
        content: "";
        position: absolute;
        top: 0;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        pointer-events: none;
      }

      .bottom-nav::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04) 0%,
          transparent 40%,
          transparent 60%,
          rgba(255, 255, 255, 0.02) 100%
        );
        pointer-events: none;
        border-radius: 0;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 12px;
        transition: all var(--transition);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      .nav-item.active {
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.04) 100%
        );
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
        stroke: var(--muted);
        stroke-width: 1.5;
        fill: none;
        transition: all var(--transition);
      }

      .nav-item.active svg {
        stroke: var(--accent);
      }

      .nav-sos {
        position: relative;
      }

      .nav-sos svg {
        stroke: rgba(255, 255, 255, 0.9) !important;
        width: 26px !important;
        height: 26px !important;
      }

      .nav-sos .nav-label {
        font-weight: 600;
        letter-spacing: 1px;
      }

      .nav-sos.sos-triggered svg {
        stroke: white !important;
        animation: sosPulseNav 0.6s ease infinite;
      }

      @keyframes sosPulseNav {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }

      .nav-label {
        font-size: 10px;
        color: var(--muted);
        font-weight: 500;
        transition: all var(--transition);
      }

      .nav-item.active .nav-label {
        color: var(--accent);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 200;
        opacity: 0;
        visibility: hidden;
        transition: all var(--transition);
        max-width: 430px;
        margin: 0 auto;
        left: 0;
        right: 0;
      }

      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .modal-panel {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 430px;
        max-height: 85vh;
        background: linear-gradient(
          180deg,
          rgba(32, 32, 36, 0.8) 0%,
          rgba(22, 22, 26, 0.92) 30%,
          rgba(18, 18, 22, 0.96) 100%
        );
        backdrop-filter: blur(50px) saturate(180%) brightness(1.08);
        -webkit-backdrop-filter: blur(50px) saturate(180%) brightness(1.08);
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        z-index: 201;
        transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-bottom: none;
        box-shadow:
          0 -12px 48px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          inset 0 0 60px rgba(255, 255, 255, 0.02);
      }

      .modal-panel.active {
        transform: translateX(-50%) translateY(0);
      }

      .modal-handle {
        width: 36px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        margin: 10px auto 0;
      }

      .modal-header {
        padding: 20px 24px 16px;
        text-align: center;
        border-bottom: 1px solid var(--divider);
      }

      .modal-header h2 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.3px;
        margin-bottom: 4px;
      }

      .modal-header p {
        font-size: 12px;
        color: var(--muted);
      }

      .modal-body {
        padding: 20px 24px 40px;
      }

      .feature-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 24px;
      }

      .feature-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--card);
        border: 1px solid var(--divider);
        border-radius: 12px;
        font-size: 13px;
        font-weight: 400;
      }

      .status-badge-inline {
        padding: 12px 14px;
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.2);
        border-radius: 12px;
        font-size: 13px;
        color: #4ade80;
        text-align: center;
      }

      .future-info {
        background: var(--card);
        border: 1px solid var(--divider);
        border-radius: 16px;
        padding: 20px;
        line-height: 1.6;
        color: var(--muted);
        font-size: 13px;
      }

      .upcoming-list {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .feature-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }

      .modal-section {
        margin-top: 20px;
      }

      .modal-section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--muted);
        margin-bottom: 12px;
        font-weight: 500;
      }

      .live-preview {
        width: 100%;
        height: 180px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--divider);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .live-preview-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }

      .live-preview-text {
        font-size: 11px;
        color: var(--muted);
        z-index: 1;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .detection-log {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--divider);
        border-radius: 12px;
        padding: 14px;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 11px;
        color: var(--muted);
        max-height: 120px;
        overflow: hidden;
        margin-top: 12px;
      }

      .log-entry {
        padding: 3px 0;
        opacity: 0;
        animation: fadeInLog 0.5s ease forwards;
        display: flex;
        gap: 8px;
      }

      .log-entry .log-time {
        color: rgba(255, 255, 255, 0.3);
        flex-shrink: 0;
      }

      @keyframes fadeInLog {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .map-placeholder {
        width: 100%;
        height: 200px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--divider);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
      }

      .map-grid {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px
        );
        background-size: 24px 24px;
      }

      .route-line {
        position: absolute;
        top: 20%;
        left: 15%;
        width: 70%;
        height: 60%;
      }

      .route-line svg {
        width: 100%;
        height: 100%;
      }

      .route-path {
        stroke: rgba(255, 255, 255, 0.3);
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawRoute 3s ease infinite;
        stroke-linecap: round;
      }

      @keyframes drawRoute {
        0% {
          stroke-dashoffset: 200;
        }
        50% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: -200;
        }
      }

      .route-dot {
        fill: white;
        animation: moveDot 3s ease infinite;
      }

      .crowd-meter {
        margin-top: 16px;
      }

      .meter-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 8px;
      }

      .meter-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.2),
          rgba(255, 255, 255, 0.5)
        );
        border-radius: 3px;
        transition: width 1s ease;
      }

      .meter-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        font-size: 10px;
        color: var(--muted);
      }

      .eta-panel {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }

      .eta-card {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--divider);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
      }

      .eta-value {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .eta-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .scan-area {
        width: 100%;
        height: 200px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--divider);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .scan-line {
        position: absolute;
        left: 10%;
        width: 80%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.5),
          transparent
        );
        top: 0;
        animation: scanMove 2.5s ease-in-out infinite;
      }

      @keyframes scanMove {
        0% {
          top: 10%;

      function closeModal() {
        if (activeModal === 'vision' && typeof onVisionModalClose === 'function') {
           onVisionModalClose();
        }

        document.getElementById("modalOverlay").classList.remove("active");
        document.getElementById("modalPanel").classList.remove("active");
        modalIntervals.forEach(clearInterval);
        modalIntervals = [];

        // Cancel any ongoing AI speech
        if (window.speechSynthesis) {
          window.speechSynthesis.__isCanceling = true;
          window.speechSynthesis.cancel();
          setTimeout(() => {
            if (window.speechSynthesis) window.speechSynthesis.__isCanceling = false;
          }, 300);
        }

        // Destroy MobilityMap if it was active
        if (typeof MobilityMap !== 'undefined' && MobilityMap.isActive()) {

      // ===== AI COMPANION STATE =====
      const companionState = {
        offlineMode: false,
        cloudMode: true,
        memoryEngine: true,
        emotionalSupport: false,
        isRecording: false,
        isSpeaking: false,
      };
      let conversationHistory = [];
      let userPreferences = [];

      function loadMemory() {
        try {
          const saved = localStorage.getItem("visionaid_memory");
          if (saved) {
            const data = JSON.parse(saved);
            conversationHistory = data.history || [];
            userPreferences = data.preferences || [];
          }
        } catch (e) {
          console.warn("Memory load failed:", e);
        }
      }
      function saveMemory() {
        if (!companionState.memoryEngine) return;
        try {
          localStorage.setItem(
            "visionaid_memory",
            JSON.stringify({
              history: conversationHistory.slice(-30),
              preferences: userPreferences,
            }),
          );
        } catch (e) {}
      }
      loadMemory();

      function getSystemPrompt() {
        let prompt =
          "You are the Vision AID assistant. Your job is to help visually impaired users navigate the application, explain features, provide guidance, and respond with clear, concise, accessible instructions.\n\nVision AID features include:\n- Smart Vision Engine: Real-time object detection, obstacle estimation, motion tracking\n- Mobility Intelligence: GPS navigation, turn-by-turn guidance, crowd density, POI finder\n- Visual Recognition: OCR scanning, currency recognition, face detection, QR scanner\n- Guardian Safety: Emergency SOS, fall detection, risk monitoring\n- AI Companion: This chat system with voice, wake word, offline and cloud modes\n- Personalization: Alert sensitivity, speech speed, haptic intensity, user profiles\n\nKeep responses concise and easy to understand. Use simple language.";
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateStr = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        const locName = (document.getElementById("widgetLocation") && document.getElementById("widgetLocation").textContent) || "Unknown location";
        const coords = (document.getElementById("widgetCoords") && document.getElementById("widgetCoords").textContent) || "Unknown coordinates";
        prompt += `\n\nContext - The user's current device location is: ${locName} (Coordinates: ${coords}). The current time is ${timeStr} and today is ${dateStr}. If the user asks where they are, what time it is, or today's date, use this information.`;

        if (companionState.emotionalSupport) {
          prompt +=
            '\n\nIMPORTANT - Emotional Support Mode is ON. You must:\n- Use warm, empathetic, and reassuring language\n- Be patient and gentle in all responses\n- Provide encouragement and emotional comfort\n- Acknowledge the user\'s feelings\n- Offer calm, step-by-step guidance\n- Use phrases like "I\'m here for you", "Take your time", "You\'re doing great"\n- Never rush the user or use curt responses';
        }
        if (userPreferences.length > 0) {
          prompt +=
            "\n\nUser preferences to remember:\n" +
            userPreferences.map((p) => "- " + p).join("\n");
        }
        return prompt;
      }

      // ===== OFFLINE RESPONSES =====
      const offlineResponses = {
        greetings: {
          patterns: ["hello", "hi", "hey", "good morning", "good evening"],

        mobility: {

        recognition: {

        companion: {
          patterns: [
            "ai",
            "companion",
            "chat",
            "voice",
            "wake",
            "offline",
            "cloud",
            "memory",
            "emotion",
          ],
          responses: [
            "I'm your AI Companion! I support voice input (tap the mic), offline/cloud modes, conversation memory, and emotional support mode.",
          ],
        },
        how: {
          patterns: [
            "how do i",
            "how to",
            "how can",
            "what can",
            "what do",
            "what is",
            "tell me",
          ],
          responses: [
            "I can help you with the Vision AID app features. Try asking about specific modules like Vision, Mobility, Recognition, Safety, or Settings.",
          ],
        },
        thanks: {
          patterns: ["thank", "thanks", "appreciate"],
          responses: [
            "You're welcome! I'm always here to help. Feel free to ask anything else.",
          ],
        },
        fallback: {
          patterns: [],
          responses: [
            "I'm currently in offline mode with limited capabilities. I can help with basic navigation, feature explanations, and common tasks. For full conversational AI, please enable Cloud Mode.",
            "I'm offline right now, so I can only assist with basic app guidance. Try asking about a specific Vision AID feature!",
          ],
        },
      };
      function getOfflineResponse(message) {
        const lower = message.toLowerCase();
        for (const [cat, data] of Object.entries(offlineResponses)) {
          if (cat === "fallback") continue;
          for (const p of data.patterns) {
            if (lower.includes(p))
              return data.responses[
                Math.floor(Math.random() * data.responses.length)
              ];
          }
        }
        return offlineResponses.fallback.responses[
          Math.floor(Math.random() * offlineResponses.fallback.responses.length)
        ];
      }

      // ===== TTS =====
      function speakText(text) {
        if (!("speechSynthesis" in window)) return;
        
        // Let the system know this was a programmatic cancel, so onend doesn't trigger Mic
        window.speechSynthesis.__isCanceling = true;
        window.speechSynthesis.pause(); // Helps ensure immediate stop
        window.speechSynthesis.cancel();
        
        setTimeout(() => {
          window.speechSynthesis.__isCanceling = false;
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 0.95;
          u.pitch = 1.0;
          u.volume = 1.0;
          u.lang = "en-US";
          companionState.isSpeaking = true;
          u.onend = (e) => {
            companionState.isSpeaking = false;
            if (window.speechSynthesis.__isCanceling) return;
          };
          u.onerror = () => {
            companionState.isSpeaking = false;
          };
          window.speechSynthesis.speak(u);
        }, 50);
      }

      // ===== INJECT SOUND BLEEP =====
      function playWakeSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch (e) {}
      }

      function checkForMemoryCommand(msg) {
        const lower = msg.toLowerCase();
        const pats = [
          "remember that",
          "remember i",
          "my preference",
          "i prefer",
          "i like",
          "keep in mind",
          "note that",
        ];
        for (const p of pats) {
          if (lower.includes(p)) {
            const pref = msg
              .replace(/remember that|remember i|note that|keep in mind/gi, "")
              .trim();
            if (pref.length > 3) {
              userPreferences.push(pref);
              if (userPreferences.length > 10) userPreferences.shift();
              saveMemory();
              return true;
            }
          }
        }
        return false;
      }

      // ===== MAIN SEND CHAT =====
      async function sendChat() {
        const input = document.getElementById("chatInput");
        const container = document.getElementById("chatContainer");
        if (!input || !container) return;
        const msg = input.value.trim();
        if (!msg) return;
        input.value = "";
        addChatMessage("user", msg);
        conversationHistory.push({ role: "user", text: msg });
        checkForMemoryCommand(msg);

        // ===== FULL INTENT ROUTING via RouterEngine =====
        if (typeof RouterEngine !== 'undefined') {
          RouterEngine.dispatch(msg);
          return;
        }
        
        // Fallbacks if RouterEngine fails to load
        if (typeof AIIntentParser !== 'undefined' && AIIntentParser.processMessage(msg)) {
          conversationHistory.push({ role: 'model', text: '🗺️ Opening navigation...' });
          saveMemory();
          return;
        }

        processGeneralChat(msg);
      }

      async function processGeneralChat(msg) {
        const container = document.getElementById("chatContainer");
        const useCloud = companionState.cloudMode && !companionState.offlineMode;
        if (!useCloud) {
          showTypingIndicator();
          await new Promise((r) => setTimeout(r, 600 + Math.random() * 800));
          removeTypingIndicator();
          const response = getOfflineResponse(msg);
          addChatMessage("ai", response);
          conversationHistory.push({ role: "model", text: response });
          speakText(response);
          saveMemory();
          return;
        }
        showTypingIndicator();

        try {
          // Strip ALL sensor/distance/obstacle descriptions from old AI responses
          // so the model can ONLY use the LIVE sensor snapshot injected by the server.
          // Without this, follow-ups like "now?" parrot old distance values.

          function stripSensorReadings(text) {
            return text
              // Raw sensor mentions
              .replace(/(?:ultrasonic|depth sensor|pir|motion sensor|sensor)\s*(?:shows?|reads?|says?|detects?|indicates?|reports?)\s*[^.!?]*[.!?]?/gi, '')
              // Distance with units: "about 1.5 meters away", "45cm ahead", "4 metres"
              .replace(/(?:about|around|roughly|approximately|nearly|almost)?\s*\d+(?:\.\d+)?\s*(?:cm|centimetres?|centimeters?|metres?|meters?|m)\s*(?:away|ahead|from|to|in front)?[^.!?]*[.!?]?/gi, '')
              // Natural distance phrases: "arm's length", "a couple of steps", "a few steps"
              .replace(/(?:arm'?s?\s+length|a\s+(?:couple|few|short)\s+(?:of\s+)?(?:steps?|metres?|meters?)|right\s+in\s+front\s+of\s+you|almost\s+touching|step\s+or\s+two|open\s+space)[^.!?]*[.!?]?/gi, '')
              // "nothing within/closer than X" patterns
              .replace(/(?:nothing|no\s+(?:object|obstacle)s?)\s+(?:within|closer\s+than|(?:detected\s+)?(?:within|nearby|in\s+range))[^.!?]*[.!?]?/gi, '')
              // Path clear / all clear patterns
              .replace(/(?:(?:path|area|space)\s*(?:is|'s|looks?)?\s*(?:clear|wide\s+open|open)|(?:all|everything'?s?)\s+clear|clear\s+(?:ahead|for\s+now|in\s+front)|no\s+(?:obstacles?|objects?)\s+(?:ahead|nearby|detected|in\s+(?:your\s+)?(?:way|path)))[^.!?]*[.!?]?/gi, '')
              // Object close / something ahead patterns  
              .replace(/(?:something(?:'s)?\s+(?:pretty\s+)?(?:close|near|right|ahead|there|moving)|there(?:'s)?\s+(?:something|an?\s+\w+)\s+(?:close|near|ahead|right|straight))[^.!?]*[.!?]?/gi, '')
              // Movement / motion patterns
              .replace(/(?:(?:something|anything|nothing)(?:'s)?\s+moving|movement\s+(?:detected|nearby)|area\s+is\s+(?:still|quiet)|no\s+movement)[^.!?]*[.!?]?/gi, '')
              // "still clear", "path is still clear" follow-up patterns
              .replace(/(?:still\s+(?:clear|nothing|no\s+\w+)|same\s+as\s+before|hasn'?t?\s+changed)[^.!?]*[.!?]?/gi, '')
              // Cleanup: collapse multiple spaces/periods
              .replace(/\.\s*\./g, '.')
              .replace(/\s{2,}/g, ' ')
              .trim();
          }

          const historyForAPI = companionState.memoryEngine
            ? conversationHistory
                .slice(-20)
                .filter((h) => h.role === "user" || h.role === "model")
                .map(h => {
                  if (h.role === 'model') {
                    return { ...h, text: stripSensorReadings(h.text) };
                  }
                  return h;
                })
                .filter(h => h.text.length > 0)
            : [];

          // ── 12-second hard timeout — if NVIDIA hangs, fail fast ──
          if (window.currentChatAbortCtrl) {
            try { window.currentChatAbortCtrl.abort(); } catch(e) {}
          }
          const abortCtrl = new AbortController();
          window.currentChatAbortCtrl = abortCtrl;
          const chatTimer = setTimeout(() => abortCtrl.abort(), 30000);

          const response = await fetch(getBackendUrl("/api/ai/chat"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: msg,
              history: historyForAPI.slice(0, -1),
              username: currentUser,
              systemPrompt: getSystemPrompt(),
              username: currentUser,
            }),
            signal: abortCtrl.signal,
          });
          clearTimeout(chatTimer);

          removeTypingIndicator();
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const fallback =
              errData.fallback ||
              "I'm having trouble connecting. Please try again or switch to Offline Mode.";
            addChatMessage("ai", fallback);
            speakText(fallback);
            return;
          }
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullResponse = "";
          const aiMsg = document.createElement("div");
          aiMsg.className = "chat-msg ai";
          aiMsg.innerHTML = '<span class="ai-response-text"></span>';
          container.appendChild(aiMsg);

          // OPTIMIZED: Sentence-by-sentence TTS — speak as chunks arrive
          let sentenceBuffer = "";
          let spokenSentences = 0;
          const sentenceQueue = [];
          let isSpeakingQueue = false;

          function enqueueSentence(sentence) {
            const trimmed = sentence.trim();
            if (!trimmed) return;
            sentenceQueue.push(trimmed);
            if (!isSpeakingQueue) drainSentenceQueue();
          }

          function drainSentenceQueue() {
            if (sentenceQueue.length === 0) {
              isSpeakingQueue = false;
              return;
            }
            isSpeakingQueue = true;
            const text = sentenceQueue.shift();
            if (!("speechSynthesis" in window)) { drainSentenceQueue(); return; }

            // Cancel only on the very first sentence (to stop any previous speech)
            if (spokenSentences === 0) {
              window.speechSynthesis.cancel();
            }
            spokenSentences++;

            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.95;
            u.pitch = 1.0;
            u.volume = 1.0;
            u.lang = "en-US";
            u.onend = () => drainSentenceQueue();
            u.onerror = () => drainSentenceQueue();
            window.speechSynthesis.speak(u);
          }

          // ── Per-chunk timeout: if the stream stalls mid-way, abort ──
          let chunkTimer;
          const resetChunkTimer = () => {
            clearTimeout(chunkTimer);
            chunkTimer = setTimeout(() => abortCtrl.abort(), 20000);
          };
          resetChunkTimer();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            clearTimeout(chunkTimer);
            const chunk = decoder.decode(value, { stream: true });
            fullResponse += chunk;
            sentenceBuffer += chunk;

            // OPTIMIZED: Detect sentence boundaries and speak immediately
            const sentenceEnd = /([.?!])\s/g;
            let match;
            while ((match = sentenceEnd.exec(sentenceBuffer)) !== null) {
              const endIdx = match.index + match[0].length;
              const sentence = sentenceBuffer.substring(0, endIdx);
              enqueueSentence(sentence);
              sentenceBuffer = sentenceBuffer.substring(endIdx);
              sentenceEnd.lastIndex = 0; // reset regex after modifying string
            }

            const textSpan = aiMsg.querySelector(".ai-response-text");
            if (textSpan) textSpan.textContent = fullResponse;
            container.scrollTop = container.scrollHeight;
            resetChunkTimer();
          }
          clearTimeout(chunkTimer);

          // Speak any remaining text that didn't end with a sentence boundary
          if (sentenceBuffer.trim()) {
            enqueueSentence(sentenceBuffer);
          }

          if (!fullResponse.trim()) {
            // Stream opened but sent nothing
            aiMsg.remove();
            throw new Error('empty stream');
          }

          const ts = document.createElement("div");
          ts.className = "chat-timestamp";
          ts.textContent = formatTimestamp();
          aiMsg.appendChild(ts);
          conversationHistory.push({ role: "model", text: fullResponse });
          saveMemory();
          // OPTIMIZED: Don't call speakText(fullResponse) — already spoken sentence-by-sentence
        } catch (error) {
          removeTypingIndicator();
          const isTimeout = error.name === 'AbortError' || error.message === 'empty stream';
          console.error("Chat error:", error);
          const fallback = isTimeout
            ? "⏱️ The AI took too long to respond. This usually means the cloud API is busy or rate-limited. Try switching to Offline Mode for instant responses."
            : "⚠️ I'm having trouble connecting to my AI brain. Please try again, or switch to Offline Mode.";
          addChatMessage("ai", fallback);
          conversationHistory.push({ role: "model", text: fallback });
          speakText(fallback);
          saveMemory();
        }
      }


      function toggleSwitch(el) {

      function initSliders() {
        document.querySelectorAll(".slider-track").forEach((track) => {
          const fill = track.querySelector(".slider-fill");
          const thumb = track.querySelector(".slider-thumb");
          const isSpeed = track.id === "speechSlider";

          function updateSlider(x) {
            const rect = track.getBoundingClientRect();
            let pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
            fill.style.width = pct * 100 + "%";
            thumb.style.left = pct * 100 + "%";
            if (isSpeed) {
              const val = (0.5 + pct * 1.5).toFixed(1);
              const sv = document.getElementById("speechVal");
              if (sv) sv.textContent = val + "x";
            } else {
              const val = Math.round(pct * 100);
              const hv = document.getElementById("hapticVal");
              if (hv) hv.textContent = val + "%";
            }
          }

          track.addEventListener(
            "touchstart",
            (e) => {
              e.preventDefault();
              updateSlider(e.touches[0].clientX);
            },
            { passive: false },
          );

          track.addEventListener(
            "touchmove",
            (e) => {
              e.preventDefault();
              updateSlider(e.touches[0].clientX);
            },
            { passive: false },
          );

          track.addEventListener("mousedown", (e) => {
            updateSlider(e.clientX);
            const move = (ev) => updateSlider(ev.clientX);
            const up = () => {
              document.removeEventListener("mousemove", move);
              document.removeEventListener("mouseup", up);
            };
            document.addEventListener("mousemove", move);
            document.addEventListener("mouseup", up);
          });
        });
      }

          .forEach((n) => n.classList.remove("active"));

        const tab = el.dataset.tab;
        if (tab === "scan") openModal("recognition");
        else if (tab === "ai") openModal("companion");
        else if (tab === "settings") openModal("personalization");
      }

      async function fallbackLocation() {
        try {
          const res = await fetch("https://get.geojs.io/v1/ip/geo.json");
          const data = await res.json();
          document.getElementById("widgetLocation").textContent = data.city || data.region || "Current Location";
          document.getElementById("widgetCoords").textContent = parseFloat(data.latitude).toFixed(4) + "°N " + parseFloat(data.longitude).toFixed(4) + "°E";
        } catch (e) {
          document.getElementById("widgetLocation").textContent = "Location Off";
          document.getElementById("widgetCoords").textContent = "--°N --°E";
        }
      }

      // OPTIMIZED: Dashboard geocode cache — avoids redundant Nominatim API calls
      let _dashGeoCache = { name: null, lat: 0, lng: 0, cachedAt: 0 };

      function updateLocation() {
        if ("geolocation" in navigator) {
          let wResolved = false;
          const wTimer = setTimeout(() => {
            if (!wResolved) {
              wResolved = true;
              fallbackLocation();
            }
          }, 10000);

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              if (!wResolved) {
                wResolved = true;
                clearTimeout(wTimer);
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                document.getElementById("widgetCoords").textContent =
                  lat.toFixed(4) + "°N " + lng.toFixed(4) + "°E";
                
                // OPTIMIZED: Check geocode cache before calling Nominatim
                const now = Date.now();
                const delta = Math.abs(lat - _dashGeoCache.lat) + Math.abs(lng - _dashGeoCache.lng);
                if (_dashGeoCache.name && delta < 0.001 && (now - _dashGeoCache.cachedAt) < 60000) {
                  document.getElementById("widgetLocation").textContent = _dashGeoCache.name;
                  return;
                }

                try {
                  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                  const data = await res.json();
                  let placeName = "Current Location";
                  if (data && data.address) {
                    const a = data.address;
                    placeName =
                      a.neighbourhood || a.suburb || a.quarter ||
                      a.residential   || a.village || a.town   ||
                      a.city          || a.county  || "Current Location";
                  }
                  // OPTIMIZED: Cache the result
                  _dashGeoCache = { name: placeName, lat, lng, cachedAt: Date.now() };
                  document.getElementById("widgetLocation").textContent = placeName;
                } catch (e) {
                  document.getElementById("widgetLocation").textContent =
                    "Current Location";
                }
              }
            },
            (error) => {
              if (!wResolved) {
                wResolved = true;
                clearTimeout(wTimer);
                fallbackLocation();
              }
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
        } else {
          fallbackLocation();
        }
      }
      updateLocation();
      setInterval(updateLocation, 30000);

      function updateLatency() {
        if (
          navigator.connection &&
          typeof navigator.connection.rtt === "number"
        ) {
          const ms = navigator.connection.rtt;
          const el = document.getElementById("widgetLatency");
          if (el) el.textContent = ms + "ms";
          const bars = document.querySelectorAll(".signal-bar");
          const strength = ms < 50 ? 4 : ms < 100 ? 3 : ms < 200 ? 2 : 1;
          bars.forEach((b, i) => b.classList.toggle("active", i < strength));
        } else {
          const el = document.getElementById("widgetLatency");
          if (el) el.textContent = "---ms";
        }
      }
      updateLatency();
      if (navigator.connection) {
        navigator.connection.addEventListener("change", updateLatency);
      }
      setInterval(updateLatency, 5000);

      function updateSensors() {
        const st = document.getElementById('widgetSensors');
        const sc = document.getElementById('sensorCount');

        fetch(getBackendUrl('/api/pi/health'))
          .then(r => r.json())
          .then(data => {
            // 2 sensors (Ultrasonic, PIR) feed through ESP32-MIC
            // IR sensor excluded — <8mm range makes it unusable
            // If MIC is online, both sensors are online
            const sensorCount = data.micOnline ? 2 : 0;
            const camOnline = data.camOnline || false;

            let status = 'Offline';
            if (sensorCount === 2) status = 'Active';
            else if (sensorCount > 0) status = 'Degraded';

            if (st) st.textContent = status;
            if (sc) sc.textContent = sensorCount + ' modules online';
          })
          .catch(() => {
            // Can't reach backend — show offline
            if (st) st.textContent = 'Offline';
            if (sc) sc.textContent = '0 modules online';
          });
      }
      updateSensors();
      setInterval(updateSensors, 5000);

function navSOS(el) {

        label.textContent = "SENT!";
        setTimeout(() => {

      // ===== SYSTEM BOOT — initialize state on page load =====

      // Load History Helper
      async function loadChatHistory() {
        if (!currentUser) return;
        try {
          const histResp = await fetch(getBackendUrl(`/api/history?username=${encodeURIComponent(currentUser)}`));
          if (histResp.ok) {
            const history = await histResp.json();
            
            // clear the chat container but keep the first system message
            let hContainer = document.getElementById('chatContainer'); 
            if(hContainer) { 
               const msgs = hContainer.querySelectorAll('.chat-msg:not(.sys-msg)'); 
               msgs.forEach(m=>m.remove()); 
            }
            
            // reset memory
            if (typeof conversationHistory !== 'undefined') conversationHistory = [];

            if (Array.isArray(history)) {
              history.forEach(msg => {
                if (msg.role && msg.content) {
                  const uiRole = msg.role === 'assistant' ? 'ai' : msg.role;
                  addChatMessage(uiRole, msg.content, new Date(msg.created_at));
                  
                  if (typeof conversationHistory !== 'undefined') {
                    const histRole = msg.role === 'assistant' ? 'model' : msg.role;
                    conversationHistory.push({ role: histRole, text: msg.content });
                  }
                }
              });
            }
            
            // scroll down
            const container = document.getElementById("chatContainer");
            if (container) container.scrollTop = container.scrollHeight;
          }
        } catch (err) {
          console.error('[VisionAID] Failed to load history:', err);
        }
      }

      window.addEventListener('DOMContentLoaded', async () => {
        console.log('[VisionAID] App initialized. Tap mic button to begin voice input if needed.');
        loadChatHistory();
      });

    <!-- REAL-TIME GHOST CLICK PIPELINE (Physical Module To DOM Sink) -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
         const backendUrl = localStorage.getItem("visionAidBackendUrl") || "https://visionai-hig1.onrender.com";
         try {
           const sse = new EventSource(`${backendUrl}/api/stream`);
           sse.onmessage = (event) => {
             const data = JSON.parse(event.data);
             if (data.event === "HARDWARE_BTN_TOUCHED") {
               const micBtn = document.getElementById('micBtn');
               if (micBtn) micBtn.classList.add('recording');
               
               // Stop any ongoing TTS immediately and robustly
               if (window.speechSynthesis) {
                 window.speechSynthesis.__isCanceling = true;
                 window.speechSynthesis.pause();
                 window.speechSynthesis.cancel();
               }
               
               // Interrupt any ongoing Chat Generation (fetch)
               if (window.currentChatAbortCtrl) {
                 try { window.currentChatAbortCtrl.abort(); } catch(e) {}
               }
               
               // Auto-open AI Chat companion whenever physical button is touched
               const overlay = document.getElementById('modalOverlay');
               const isModalOpen = overlay && overlay.classList.contains('active');
               if (!isModalOpen || activeModal !== 'companion') {
                 const aiTab = document.querySelector('.nav-item[data-tab="ai"]');
               if (aiTab) {
                    switchTab(aiTab);
                 }
               }
             } else if (data.event === "HARDWARE_BTN_RELEASED") {
               const micBtn = document.getElementById('micBtn');
               if (micBtn) micBtn.classList.remove('recording');
             } else if (data.event === "AUDIO_RESULT") {
               const chatData = data.data;
               const micBtn = document.getElementById('micBtn');
               if (micBtn) micBtn.classList.remove('recording');

               if (typeof addChatMessage === 'function') addChatMessage("user", chatData.transcript);
               if (typeof RouterEngine !== 'undefined') {
                   RouterEngine.dispatch(chatData.transcript);
               } else if (typeof addChatMessage === 'function') {
                   addChatMessage("ai", chatData.text);
               }
             }
           };
           sse.onerror = (e) => {
             console.log("[GhostClick] SSE Stream Reconnecting...");
           };
         } catch(e) {
           console.log("Failed to map SSE pipeline.");
         }

         // HARDWARE HEALTH DIAGNOSTIC POLL
         setInterval(async () => {
           try {
             const resp = await fetch(`${backendUrl}/api/pi/health`);
             const data = await resp.json();
             const dotCam = document.getElementById('dotCam');
             const dotMic = document.getElementById('dotMic');
             
             if (dotCam) {
               if (data.camOnline) dotCam.classList.add("online");
               else dotCam.classList.remove("online");
             }
             if (dotMic) {
               if (data.micOnline) dotMic.classList.add("online");
               else dotMic.classList.remove("online");
             }
           } catch(e) {
                const dotCam = document.getElementById('dotCam');
                const dotMic = document.getElementById('dotMic');
                if (dotCam) dotCam.classList.remove("online");
                if (dotMic) dotMic.classList.remove("online");
           }
         }, 2000);
      });
    </script>
