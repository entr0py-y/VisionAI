<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AID - Auth</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

        :root {
            --bg: #0f0f10;
            --glass: rgba(20, 20, 23, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text: #ffffff;
            --muted: #a1a1aa;
            --radius: 20px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }

        /* Abstract ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: blur(40px);
            pointer-events: none;
        }

        .container {
            padding: 2rem 1.5rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
            z-index: 1;
            position: relative;
            box-sizing: border-box;
        }

        .logo-container {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255,255,255,0.15);
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 0.95rem;
            color: var(--muted);
            font-weight: 400;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .features-list {
            text-align: left;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--muted);
            padding: 0 10px;
        }

        .features-list p {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .features-list svg {
            stroke: var(--accent);
            min-width: 16px;
        }

        input, button {
            width: 100%;
            margin: 8px 0;
            padding: 15px 16px;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input {
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 3px rgba(255,255,255,0.05);
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(255,255,255,0.1);
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255,255,255,0.15);
        }
        
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(255,255,255,0.1);
        }

        .role-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: none;
        }

        .role-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(0);
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        .error-msg {
            color: #ff5555;
            font-size: 0.85rem;
            margin: 10px 0;
            min-height: 1.2rem;
            font-weight: 500;
        }
        
        .clickable-text {
            cursor: pointer;
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 20px;
            transition: color 0.2s;
        }
        
        .clickable-text:hover {
            color: var(--accent);
        }
        
        #role-selection {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
    </style>
</head>
<body>
    <!-- Background element for glassmorphism pop -->
    <div class="ambient-glow"></div>

    <div class="container" id="login-container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
        </div>
        
        <h1 id="title-text">VisionAI Access</h1>
        <h2 id="subtitle-text">Choose your role to continue</h2>

        <!-- Step 1: Select Role -->
        <div id="role-selection">
            <div class="features-list">
                <p>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Real-time visual navigation assistance
                </p>
                <p>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    Live emergency caretaker monitoring
                </p>
            </div>
            <button class="role-btn" id="btn-user">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                I am a User
            </button>
            <button class="role-btn" id="btn-caretaker">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                I am a Caretaker
            </button>
        </div>
        <div id="auth-form" class="hidden">
            <h2 id="form-title">Login</h2>
            <input type="email" id="email" placeholder="Email Address" autocomplete="email">
            <input type="password" id="password" placeholder="••••••••">
            <input type="text" id="fullname" placeholder="Full Name" class="hidden" autocomplete="name">
            <input type="tel" id="phone" placeholder="Phone Number (Optional)" class="hidden" autocomplete="tel">
            <div id="error-container" class="error-msg"></div>
            <button onclick="doAuth()" id="submit-btn" style="color: #000; display: block; width: 100%;">Sign In</button>
            <p onclick="toggleMode()" class="clickable-text" id="toggle-auth-btn">Need an account? Sign Up</p>
            <p onclick="resetRole()" class="clickable-text" style="font-size: 0.8rem; margin-top: 10px;">&larr; Back to role selection</p>
        </div>
    </div>
    
    <!-- Using Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        
        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                if (cfg.supabaseUrl && cfg.supabaseUrl.startsWith('http')) {
                    localStorage.setItem('supabase_url', cfg.supabaseUrl);
                    localStorage.setItem('supabase_key', cfg.supabaseAnonKey);
                }
            } catch(e) {}
            
            const SUPABASE_URL = localStorage.getItem('supabase_url') || 'https://placeholder.supabase.co';
            const SUPABASE_KEY = localStorage.getItem('supabase_key') || 'dummy_key';
            
            // Prevent re-declaration error by checking if it already exists from another script
            supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
        }

        let selectedRole = 'user';
        let isSignUp = false;

        document.getElementById('btn-user').addEventListener('click', () => selectRole('user'));
        document.getElementById('btn-caretaker').addEventListener('click', () => selectRole('caretaker'));

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('auth-form').classList.remove('hidden');
            clearError();
        }

        function resetRole() {
            document.getElementById('role-selection').classList.remove('hidden');
            document.getElementById('auth-form').classList.add('hidden');
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('form-title').innerText = isSignUp ? 'Sign Up' : 'Login';
            document.getElementById('submit-btn').innerText = isSignUp ? 'Create Account' : 'Login';
            document.getElementById('fullname').classList.toggle('hidden', !isSignUp);
            document.getElementById('phone').classList.toggle('hidden', !isSignUp);
            
            const toggleText = isSignUp ? 'Already have an account? Login' : 'Need an account? Sign Up';
            document.getElementById('toggle-auth-btn').innerText = toggleText;
            clearError();
        }

        function clearError() {
            document.getElementById('error-container').innerText = '';
        }

        function showError(msg) {
            document.getElementById('error-container').innerText = msg;
        }

        async function doAuth() {
            clearError();
            if (!supabaseClient) await fetchConfig();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('submit-btn');

            if (!email || !password) return showError("Email and password are required.");
            
            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                if (isSignUp) {
                    const fullname = document.getElementById('fullname').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    if (!fullname) throw new Error("Full Name is required for signup.");

                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.user) {
                        const { error: profileError } = await supabaseClient.from('profiles').insert([{
                            id: data.user.id, 
                            role: selectedRole, 
                            full_name: fullname,
                            phone: phone || null
                        }]);
                        if (profileError) throw profileError;
                        
                        alert('Signup success! Logging you in...');
                        await handleRedirect(data.user.id, selectedRole);
                    }
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    if (data.session) {
                        const { data: profile, error: dbError } = await supabaseClient.from('profiles').select('role').eq('id', data.user.id).single();
                        if (dbError) throw dbError;
                        await handleRedirect(data.user.id, profile?.role || selectedRole);
                    }
                }
            } catch (err) {
                showError(err.message);
            } finally {
                btn.innerText = isSignUp ? 'Create Account' : 'Login';
                btn.disabled = false;
            }
        }

        async function handleRedirect(userId, role) {
            localStorage.setItem('vision_user_role', role);
            if (role === 'user') {
                window.location.href = '/index.html';
            } else {
                window.location.href = '/caretaker.html';
            }
        }

        // Auto-check existing session on load
        window.onload = async () => {
            await fetchConfig();
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
                if (profile) handleRedirect(session.user.id, profile.role);
            }
        }
    </script>
</body>
</html>
