<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision AID - Auth</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

        :root {
            --bg: #0f0f10;
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text: #ffffff;
            --muted: #a1a1aa;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            background: var(--glass);
            padding: 2.5rem 2rem;
            border-radius: var(--radius);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 1rem;
            color: var(--muted);
            font-weight: 400;
            margin-bottom: 30px;
        }

        input, button {
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s ease;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        button:active {
            transform: translateY(0);
        }

        .role-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .role-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .hidden {
            display: none !important;
        }

        .error-msg {
            color: #ff4444;
            font-size: 0.85em;
            margin: 10px 0;
            min-height: 1.2em;
        }
        
        .clickable-text {
            cursor: pointer;
            color: var(--muted);
            font-size: 0.9em;
            margin-top: 20px;
            transition: color 0.2s;
        }
        
        .clickable-text:hover {
            color: var(--accent);
        }
        
        #role-selection {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vision AID</h1>
        <div id="role-selection">
            <h2>Select your role to continue</h2>
            <button class="role-btn" id="btn-user">I am a User</button>
            <button class="role-btn" id="btn-caretaker">I am a Caretaker</button>
        </div>
        <div id="auth-form" class="hidden">
            <h2 id="form-title">Login</h2>
            <input type="email" id="email" placeholder="Email Address" autocomplete="email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="fullname" placeholder="Full Name" class="hidden" autocomplete="name">
            <input type="tel" id="phone" placeholder="Phone Number (Optional)" class="hidden" autocomplete="tel">
            <div id="error-container" class="error-msg"></div>
            <button onclick="doAuth()" id="submit-btn" style="color: #000; display: block; width: 100%;">Login</button>
            <p onclick="toggleMode()" class="clickable-text" id="toggle-auth-btn">Need an account? Sign Up</p>
            <p onclick="resetRole()" class="clickable-text" style="font-size: 0.8rem; margin-top: 10px;">Back to role selection</p>
        </div>
    </div>
    
    <!-- Using Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabaseClient = null;
        
        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                if (cfg.supabaseUrl && cfg.supabaseUrl.startsWith('http')) {
                    localStorage.setItem('supabase_url', cfg.supabaseUrl);
                    localStorage.setItem('supabase_key', cfg.supabaseAnonKey);
                }
            } catch(e) {}
            
            const SUPABASE_URL = localStorage.getItem('supabase_url') || 'https://placeholder.supabase.co';
            const SUPABASE_KEY = localStorage.getItem('supabase_key') || 'dummy_key';
            
            // Prevent re-declaration error by checking if it already exists from another script
            supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
        }

        let selectedRole = 'user';
        let isSignUp = false;

        document.getElementById('btn-user').addEventListener('click', () => selectRole('user'));
        document.getElementById('btn-caretaker').addEventListener('click', () => selectRole('caretaker'));

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('auth-form').classList.remove('hidden');
            clearError();
        }

        function resetRole() {
            document.getElementById('role-selection').classList.remove('hidden');
            document.getElementById('auth-form').classList.add('hidden');
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('form-title').innerText = isSignUp ? 'Sign Up' : 'Login';
            document.getElementById('submit-btn').innerText = isSignUp ? 'Create Account' : 'Login';
            document.getElementById('fullname').classList.toggle('hidden', !isSignUp);
            document.getElementById('phone').classList.toggle('hidden', !isSignUp);
            
            const toggleText = isSignUp ? 'Already have an account? Login' : 'Need an account? Sign Up';
            document.getElementById('toggle-auth-btn').innerText = toggleText;
            clearError();
        }

        function clearError() {
            document.getElementById('error-container').innerText = '';
        }

        function showError(msg) {
            document.getElementById('error-container').innerText = msg;
        }

        async function doAuth() {
            clearError();
            if (!supabaseClient) await fetchConfig();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('submit-btn');

            if (!email || !password) return showError("Email and password are required.");
            
            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                if (isSignUp) {
                    const fullname = document.getElementById('fullname').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    if (!fullname) throw new Error("Full Name is required for signup.");

                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.user) {
                        const { error: profileError } = await supabaseClient.from('profiles').insert([{
                            id: data.user.id, 
                            role: selectedRole, 
                            full_name: fullname,
                            phone: phone || null
                        }]);
                        if (profileError) throw profileError;
                        
                        alert('Signup success! Logging you in...');
                        await handleRedirect(data.user.id, selectedRole);
                    }
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    if (data.session) {
                        const { data: profile, error: dbError } = await supabaseClient.from('profiles').select('role').eq('id', data.user.id).single();
                        if (dbError) throw dbError;
                        await handleRedirect(data.user.id, profile?.role || selectedRole);
                    }
                }
            } catch (err) {
                showError(err.message);
            } finally {
                btn.innerText = isSignUp ? 'Create Account' : 'Login';
                btn.disabled = false;
            }
        }

        async function handleRedirect(userId, role) {
            localStorage.setItem('vision_user_role', role);
            if (role === 'user') {
                window.location.href = '/index.html';
            } else {
                window.location.href = '/caretaker.html';
            }
        }

        // Auto-check existing session on load
        window.onload = async () => {
            await fetchConfig();
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
                if (profile) handleRedirect(session.user.id, profile.role);
            }
        }
    </script>
</body>
</html>
